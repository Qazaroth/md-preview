[git]
conventional_commits = false
tag_prefix = ""
ignore_merge_commits = true

[output]
file = "CHANGELOG.md"

[parser]
allow_unconventional = true

[changelog]
body = """
Release {{ version | trim_start_matches(pat="v") }} - {{ timestamp | date(format="%Y-%m-%d") }}

{% for group, commits in commits | group_by(attribute="group") if commits | length > 0 %}
### {{ group }}

{% for commit in commits %}
- {{ commit.message }}
{% endfor %}

{% endfor %}
"""

[sections]
feat = { title = "Features", kind = "feat" }
fix  = { title = "Bug Fixes", kind = "fix" }
chore = { title = "Chores", kind = "chore" }
docs  = { title = "Documentation", kind = "docs" }
