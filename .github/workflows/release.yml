name: Build & Release

on:
  push:
    tags:
      - "v*.*.*" # triggers on version tags like v1.0.0

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: md-preview
            name: md-preview-linux

          - os: macos-latest
            target: x86_64-apple-darwin
            bin: md-preview
            name: md-preview-macos

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: md-preview.exe
            name: md-preview-windows.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Rename binary
        run: |
          mkdir dist
          cp target/release/${{ matrix.bin }} dist/${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*
