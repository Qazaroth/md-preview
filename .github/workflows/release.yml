name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            bin: md-preview
            ext: ""
          - os: macos-latest
            target: macos
            bin: md-preview
            ext: ""
          - os: windows-latest
            target: windows
            bin: md-preview
            ext: ".exe"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Get version
        shell: bash
        run: |
          VERSION=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[0].version')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release

      - name: Prepare dist
        run: mkdir -p dist

      - name: Strip binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: strip target/release/${{ matrix.bin }}

      - name: Rename binary for release
        shell: bash
        run: |
          cp target/release/${{ matrix.bin }}${{ matrix.ext }} \
             dist/${{ matrix.bin }}-${{ env.VERSION }}-${{ matrix.target }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bin }}-${{ env.VERSION }}-${{ matrix.target }}${{ matrix.ext }}
          path: dist/${{ matrix.bin }}-${{ env.VERSION }}-${{ matrix.target }}${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Delete previous release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          delete_assets: true # deletes all existing files for this tag

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean dist
        run: rm -rf dist

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Debug dist (optional)
        shell: bash
        run: ls -R dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: "Release ${{ github.ref_name }}"
          files: dist/**/*
          overwrite_files: true # <--- this ensures duplicates are replaced
