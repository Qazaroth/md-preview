name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            bin: md-preview
          - os: macos-latest
            bin: md-preview
          - os: windows-latest
            bin: md-preview.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Get version
        shell: bash
        run: |
          VERSION=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[0].version')
          echo "VERSION=$VERSION"

      - name: Build release binary
        run: cargo build --release

      - name: Prepare dist
        run: |
          mkdir -p dist

      - name: Strip binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: strip target/release/${{ matrix.bin }}

      - name: Rename binary for release
        run: |
          mkdir -p dist
          # Add version to filename
          cp target/release/${{ matrix.bin }} dist/${{ matrix.bin }}-${VERSION}-${{ matrix.os }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bin }}-${{ env.VERSION }}-${{ matrix.os }}
          path: dist/${{ matrix.bin }}-${VERSION}-${{ matrix.os }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: "Release ${{ github.ref_name }}"
          files: dist/**/*
