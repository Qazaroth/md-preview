name: Build & Release

on:
  push:
    tags:
      - "v*.*.*" # triggers on version tags like v1.0.0

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: md-preview
            name: md-preview-linux

          - os: macos-latest
            target: x86_64-apple-darwin
            bin: md-preview
            name: md-preview-macos

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: md-preview.exe
            name: md-preview-windows.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Strip binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: strip target/release/${{ matrix.bin }}

      - name: Rename binary for release
        run: |
          mkdir -p dist
          cp target/release/${{ matrix.bin }} dist/${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}

  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: cargo install git-cliff --locked

      - name: Generate CHANGELOG.md
        run: git-cliff -o CHANGELOG.md

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: CHANGELOG.md

  release:
    name: Create Release
    needs: [build, changelog]
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog
          path: .

      - name: Debug changelog
        run: |
          ls -la
          echo "----- CHANGELOG CONTENT -----"
          cat CHANGELOG.md

      - name: Create GitHub Release & Upload Binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: dist/**/*
